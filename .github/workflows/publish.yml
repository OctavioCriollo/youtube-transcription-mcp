name: Publish container image to GHCR

# When this runs:
#  - on every push to main (publishes :latest and :main-<sha>)
#  - on version tags like v0.1.0 (publishes :v0.1.0 and :latest)
#  - manually from the Actions tab (workflow_dispatch)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Image name: ghcr.io/<owner>/<repo>  (lowercased automatically below)
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # read the repo
      packages: write       # push to GHCR — this replaces a manual PAT
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by Actions

      - name: Derive lowercase image name
        id: meta
        run: echo "image=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAGS="${IMAGE}:latest"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          TAGS="${TAGS},${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
