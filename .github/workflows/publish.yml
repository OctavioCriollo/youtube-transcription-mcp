name: Publish container image to GHCR

# When this runs:
#  - on every push to main (publishes :latest and :sha-<sha>)
#  - on version tags like v0.1.0 (publishes :v0.1.0 and :latest)
#  - manually from the Actions tab (workflow_dispatch)
#
# The image is published ONLY if the `test` job passes first (needs: test).
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Image name: ghcr.io/<owner>/<repo>  (lowercased automatically below)
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Gate: lint + dependency consistency + tests, on the SAME Python as the image
  # (3.14). Runs inside a python:3.14 container so we test on the production
  # interpreter, not the runner's default. Blocks the publish on failure.
  test:
    runs-on: ubuntu-latest
    container: python:3.14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install package (base + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff)
        run: ruff check .

      - name: Dependency consistency (pip check)
        run: python -m pip check

      - name: Tests (pytest)
        run: pytest

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read        # read the repo
      packages: write       # push to GHCR — this replaces a manual PAT
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-provided by Actions

      - name: Derive lowercase image name
        id: meta
        run: echo "image=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAGS="${IMAGE}:latest"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          TAGS="${TAGS},${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
