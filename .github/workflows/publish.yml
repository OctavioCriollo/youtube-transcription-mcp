name: Publish container image to GHCR

# When this runs:
#  - on every push to main (publishes :latest and :sha-<sha>)
#  - on version tags like v0.1.0 (publishes :v0.1.0 and :latest)
#  - manually from the Actions tab (workflow_dispatch)
#
# Two images are published, each gated on its own test job:
#  - ghcr.io/<owner>/<repo>            (the transcription MCP)
#  - ghcr.io/<owner>/<repo>-authgate   (the human-in-the-loop login gateway)
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Gate for the MCP image: lint + dependency consistency + tests, on the SAME
  # Python as the image (3.14). Blocks the MCP publish on failure.
  test:
    runs-on: ubuntu-latest
    container: python:3.14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        run: python -m pip install --upgrade pip uv==0.10.5

      - name: Sync package from lockfile (base + dev)
        run: |
          uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: uv run --frozen ruff check .

      - name: Dependency consistency (uv pip check)
        run: uv pip check

      - name: Tests (pytest)
        run: uv run --frozen pytest

  # Gate for the authgate image: its own pure-logic + app tests. Runs on the
  # same Python as its Dockerfile base (3.12). The browser layer is not
  # exercised in CI (it needs a display); the logic and HTTP surface are.
  test-authgate:
    runs-on: ubuntu-latest
    container: python:3.12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install authgate (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install ./authgate[dev]

      - name: Lint (ruff)
        run: ruff check authgate/

      - name: Tests (pytest)
        run: pytest authgate/tests

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase image name
        id: meta
        run: echo "image=${REGISTRY,,}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAGS="${IMAGE}:latest"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          TAGS="${TAGS},${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false

  build-and-push-authgate:
    needs: test-authgate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase image name
        id: meta
        run: echo "image=${REGISTRY,,}/${IMAGE_NAME,,}-authgate" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAGS="${IMAGE}:latest"
          SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-12)"
          TAGS="${TAGS},${IMAGE}:sha-${SHORT_SHA}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS},${IMAGE}:${GITHUB_REF_NAME}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push (authgate)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: authgate/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
